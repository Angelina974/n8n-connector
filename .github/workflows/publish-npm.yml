name: Publish n8n Node to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_MODE: "true"
    defaults:
      run:
        working-directory: n8n-nodes-airprocess

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          always-auth: true
          cache: npm
          cache-dependency-path: n8n-nodes-airprocess/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm whoami --registry=https://registry.npmjs.org
          RELEASE_MODE=true npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.N8N_NODES_AIRPROCESS }}
